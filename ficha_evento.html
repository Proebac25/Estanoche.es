<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi perfil - EstaNoche.es</title>
  <link rel="manifest" href="/manifest.json">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#121212;color:white;min-height:100vh;font-family:system-ui,sans-serif}
    @keyframes gradient{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    .hero-bg{background:linear-gradient(135deg,#3C3C8A,#1C1C3A 40%,#F72585);background-size:200% 200%;animation:gradient 15s ease infinite;position:fixed;inset:0;z-index:-1}
    .container{max-width:1280px;margin:0 auto;padding:0 1rem;position:relative;z-index:1}
    header{display:flex;justify-content:space-between;align-items:center;padding:1rem;position:fixed;top:0;left:0;right:0;backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.1);z-index:1000}
    .logo{font-weight:bold;font-size:1.25rem}
    .logo-subtitle{font-size:0.875rem;color:#B3B3B3}
    .btn-gradiente{background:linear-gradient(90deg,#F72585,#FFB703);padding:0.9rem 2.5rem;border:none;border-radius:9999px;color:white;font-weight:bold;cursor:pointer;transition:all .3s;text-decoration:none}
    .content{max-width:56rem;margin:4rem auto;background:rgba(18,18,18,0.95);padding:3rem 3rem;border-radius:1.8rem;backdrop-filter:blur(14px);box-shadow:0 20px 40px rgba(0,0,0,0.3);position:relative;padding-bottom:8rem}
    h1{font-family:'Playfair Display',serif;font-size:3rem;margin-bottom:2rem;text-align:center}
    .form{max-width:48rem;margin:0 auto}
    .form-group{margin-bottom:2.2rem}
    .label{font-size:1.1rem;color:#FFB703;margin-bottom:0.6rem;font-weight:600}
    input,select,textarea{width:100%;padding:1.1rem;border-radius:1.2rem;background:rgba(255,255,255,0.1);border:none;color:white;font-size:1.1rem}
    input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.6)}
    textarea{resize:vertical;min-height:140px}
    .success{color:#25D366;font-weight:bold;margin-bottom:1.5rem;text-align:center}
    footer{position:absolute;bottom:0;left:0;right:0;padding:1.5rem 3rem;background:rgba(0,0,0,0.3);backdrop-filter:blur(10px)}
    footer .buttons{display:flex;justify-content:space-between;align-items:center}
    footer .copyright{text-align:center;margin-top:0.5rem;font-size:0.9rem;color:#B3B3B3}

    /* SELECT CORREGIDO: legible al desplegar */
    select {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'%3e%3cpath d='M7 10l5 5 5-5z'/%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 1rem center;
      background-size: 12px;
    }
    select option {
      background:#121212;
      color:white;
      padding:1rem;
    }
  </style>
</head>
