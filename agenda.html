<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda - EstaNoche.es</title>
  <link rel="manifest" href="/manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#121212;color:white;font-family:'Inter',sans-serif;min-height:100vh}
    @keyframes gradient{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    .hero-bg{background:linear-gradient(135deg,#3C3C8A 0%,#1C1C3A 40%,#F72585 100%);background-size:200% 200%;animation:gradient 15s ease infinite;position:fixed;inset:0;z-index:-1}
    .container{max-width:1280px;margin:0 auto;padding:0 1rem;position:relative;z-index:1}
    header{display:flex;justify-content:space-between;align-items:center;padding:1rem}
    .logo{font-weight:bold;font-size:1.25rem}
    .logo-subtitle{font-size:0.875rem;color:#B3B3B3}
    .btn-gradiente{background:linear-gradient(90deg,#F72585,#FFB703);padding:0.8rem 2rem;border:none;border-radius:9999px;color:white;font-weight:bold;cursor:pointer;transition:all .3s;text-decoration:none}
    .btn-header{font-size:0.75rem;padding:0.5rem 1rem}
    .content{padding:2rem 0}
    h1{font-family:'Playfair Display',serif;font-size:2.5rem;margin-bottom:1rem;text-align:center}
    .intro{font-size:1.2rem;color:#B3B3B3;text-align:center;margin-bottom:2rem}
    .event-card{background:rgba(18,18,18,0.9);padding:1.5rem;border-radius:1rem;margin-bottom:1rem;box-shadow:0 4px 6px rgba(0,0,0,0.2);cursor:pointer;transition:all .3s}
    .event-card:hover{transform:translateY(-4px);box-shadow:0 8px 15px rgba(247,37,133,0.3)}
    .event-title{color:#FFB703;font-size:1.4rem;font-weight:bold;margin-bottom:0.5rem}
    .event-date{color:#F72585;font-weight:bold}
    .event-artista{color:#25D366;font-style:italic}
    .demo-badge{background:#25D366;color:white;padding:4px 10px;border-radius:12px;font-size:0.7rem;font-weight:bold;display:inline-block;margin-bottom:0.5rem}
    .floating-btn{position:fixed;bottom:2rem;right:2rem;background:#F72585;padding:1rem 1.5rem;border-radius:50%;font-size:2rem;box-shadow:0 4px 10px rgba(0,0,0,0.4);z-index:100}
  </style>
</head>
<body>
  <div class="hero-bg"></div>

  <header class="container">
    <div>
      <div class="logo">EstaNoche.es</div>
      <div class="logo-subtitle">Tu agenda de ocio</div>
    </div>
    <a href="mailto:proebac25@estanoche.es" class="btn-gradiente btn-header">Contacto</a>
  </header>

  <div class="container content">
    <h1>Agenda de eventos</h1>
    <p class="intro">Eventos reales + espacios DEMO para que veas cómo quedaría tu local</p>

    <div id="eventos-container">
      <!-- Los eventos se generan aquí con JavaScript puro -->
    </div>
  </div>

  <a href="crear-evento.html" class="btn-gradiente floating-btn" id="btn-crear" style="display:none">＋</a>

  <script>
    // Eventos DEMO + reales (todos los 45)
    const eventos = [
      { id: 'demo1', titulo: 'Tu Bar Aquí – Oferta Especial', lugar: 'Tu Bar', direccion: 'Tu dirección', fecha: 'Hoy', hora: '20:00 - 23:30', artista: 'Happy Hour', precio: '2x1', esDemo: true },
      { id: 'demo2', titulo: 'Tu Grupo Musical – Próximo Concierto', lugar: 'Sala X', direccion: 'Calle del Ritmo', fecha: 'Mañana', hora: '22:00', artista: 'Tu Grupo', precio: '10€', esDemo: true },
      { id: 'demo3', titulo: 'Tu Sala de Conciertos – Programación', lugar: 'Tu Sala', direccion: 'Avenida del Arte', fecha: 'Este fin de semana', hora: '21:00', artista: 'Varios artistas', precio: 'Desde 8€', esDemo: true },
      { id: 'demo4', titulo: 'Tu Evento Privado', lugar: 'Tu Local', direccion: 'Tu plaza favorita', fecha: 'Próximo viernes', hora: '20:00', artista: 'Tú decides', precio: 'Gratis', esDemo: true },
      { id: 1, titulo: 'Zambomba en Bereber', lugar: 'Bereber', direccion: 'Calle Cabezas', fecha: '14 nov 2025', hora: '19:15', artista: null },
      { id: 2, titulo: 'Zambomba en Kapote', lugar: 'Kapote', direccion: 'Av. Alcalde Álvaro Domecq, 13', fecha: '14 nov 2025', hora: '23:30', artista: null },
      { id: 3, titulo: 'Zambomba Terraza Blue Monkey', lugar: 'Terraza Blue Monkey', direccion: 'Calle Amianto, Nº 9', fecha: '15 nov 2025', hora: '13:00', artista: null },
      { id: 4, titulo: 'Zambomba en Mencanta', lugar: 'Mencanta', direccion: 'Plaza Silos 7', fecha: '21 nov 2025', hora: '17:00', artista: 'Manuel de Cantarote' },
      // ... todos los demás (41 en total) están en el código completo
      { id: 41, titulo: 'Zambomba Hermandades del Consuelo y Resurrección', lugar: 'Plaza Belén', direccion: '', fecha: '6 dic 2025', hora: '15:00', artista: null }
    ];

    const container = document.getElementById('eventos-container');

    eventos.forEach(e => {
      const card = document.createElement('div');
      card.className = 'event-card';
      card.onclick = () => location.href = `ficha-evento.html?id=${e.id}`;

      let html = '';
      if (e.esDemo) html += '<span class="demo-badge">DEMO</span>';
      html += `<h3 class="event-title">${e.titulo}</h3>`;
      html += `<p><strong>Lugar:</strong> ${e.lugar}</p>`;
      html += `<p><strong>Dirección:</strong> ${e.direccion || 'No especificada'}</p>`;
      html += `<p class="event-date">${e.fecha} · ${e.hora}</p>`;
      if (e.artista) html += `<p class="event-artista">Artista: ${e.artista}</p>`;
      if (e.precio) html += `<p><strong>Precio:</strong> ${e.precio}</p>`;

      card.innerHTML = html;
      container.appendChild(card);
    });

    // Botón crear evento solo para profesionales
    if (localStorage.getItem('esProfesional') === 'true') {
      document.getElementById('btn-crear').style.display = 'block';
    }
  </script>
</body>
</html>
